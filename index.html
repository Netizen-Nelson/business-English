<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Small Talk || Daily Life</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/bp-styles.css">
  <style>
    :root {
      --bp-color-1:        #0c0d0c;
      --bp-color-shell:    #c6c7bd;
      --bp-color-special:  #b9c971;
      --bp-color-lavender: #C3A5E5;
      --bp-color-attention:#E5E5A6;
      --bp-color-sky:      #04b5a3;
      --bp-color-pink:     #FFB3D9;
      --bp-color-orange:   #f69653;
      --bp-color-info:     #6495e3;
      --bp-color-safe:     #73d192;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans TC', 'Open Sans', sans-serif;
      background-color: var(--bp-color-1);
      color: var(--bp-color-shell);
      min-height: 100vh;
      padding: 16px;
      line-height: 1.5;
    }

  </style>
</head>
<body>
<section id="section1" class="m-3 mx-auto" style="width: 600px;">
<div id="tip-hovertip" class="bp-hidden">1<br>2</div>
<div class="m-0 p-0 bp-border-info">
	<dual-cell id="t" theme="info" border-style="dashed" cols="3" col-widths="1:6:3" carousel-indicator="false"
		menu-button-icon-toggle="bi-chevron-down" menu-button-icon-toggle-expanded="bi-chevron-up">
	<dual-row>
	<dual-col>#1</dual-col>
		<dual-col carousel-interval="6000">
			<dual-item>How often do you exercise?</dual-item>
			<dual-item>你多久運動一次呢？</dual-item>
		</dual-col>
		<dual-col>
			<word-flip data-color="warning" mode="tooltip" hover data-content="複製貼上對方問題的用詞和句型">應聲蟲式回答</word-flip>
		</dual-col>
	</dual-row>
	<dual-row>
		<dual-col span="all">
			<div class="fs-small">
				I exercise about three times a week. I go jogging in the park near my home. I think jogging is beneficial to my health.
			</div>	
		</dual-col>
	</dual-row>
	<dual-row>
		<dual-col hover-tip-src="#tip-hovertip" info-src="#tip-hovertip" info-color="info" info-icon="question-circle-fill">
			01
		</dual-col>
		<dual-col>首次部署流程…</dual-col>
		<dual-col>完成</dual-col>
	</dual-row>
	<dual-col span="all">全寬備註列</dual-col>
	</dual-cell>
</div>

</section>

<section id="section2" class="m-3">


</section>

<section id="section3" class="m-3">


</section>


<script src="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/fill-in-blanks.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/success-blast.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/card-badge.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/grid-table.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Netizen-Nelson/web-dev/bp-tools.js"></script>

</body>
</html>
